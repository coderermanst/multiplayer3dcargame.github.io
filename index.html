<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiplayer Block Car Battle</title>
<style>
  body { font-family: Arial, sans-serif; background:#222; color:#fff; margin:0; padding:0; }
  h1 { margin:20px; }
  .panel { margin:20px; padding:15px; background:#333; border-radius:8px; }
  #builderCanvas, #raceCanvas { background:#111; border:2px solid #fff; }
  button { margin:5px 5px 5px 0; padding:6px 12px; cursor:pointer; }
  label { display:block; margin:5px 0; }
  #roundInfo { margin-top:8px; font-weight:bold; }
  .block-type-btn.selected { border:2px solid #0ff; }
</style>
</head>
<body>

<h1>Multiplayer Block Car Battle + PeerJS</h1>

<div class="panel">
  <h2>1. Build your car (blocks)</h2>
  <label>Block color: <input type="color" id="blockColor" value="#ff0000"></label>
  <div>
    <button class="block-type-btn" data-type="normal" id="btnNormal">Normal</button>
    <button class="block-type-btn" data-type="booster" id="btnBooster">Booster</button>
    <button class="block-type-btn" data-type="gun" id="btnGun">Gun</button>
  </div>
  <p>Click on the grid to place/remove blocks. Different colors per block.</p>
  <canvas id="builderCanvas" width="400" height="240"></canvas><br>
  <button id="clearCar">Clear</button>
  <p id="builderStatus"></p>
  <p id="roundInfo"></p>
</div>

<div class="panel">
  <h2>2. Multiplayer</h2>
  <button id="hostBtn">Host Game</button>
  <button id="joinBtn">Join Game</button>
  <p id="roomInfo"></p>
</div>

<div class="panel">
  <h2>3. Battle</h2>
  <p>Arrows = move, Shift = boosters, E = shoot.</p>
  <canvas id="raceCanvas" width="800" height="400"></canvas><br>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ===== PREVENT ARROW KEYS FROM SCROLLING =====
window.addEventListener("keydown", function(e) {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) {
    e.preventDefault();
  }
}, { passive:false });

// ===== BUILDER SETUP =====
const builderCanvas = document.getElementById('builderCanvas');
const bctx = builderCanvas.getContext('2d');
const GRID_COLS = 20;
const GRID_ROWS = 12;
const CELL_W = builderCanvas.width / GRID_COLS;
const CELL_H = builderCanvas.height / GRID_ROWS;

// grid[r][c] = { type: "normal"|"booster"|"gun", color: "#rrggbb" } or null
let carGrid = Array.from({ length: GRID_ROWS }, () =>
  Array.from({ length: GRID_COLS }, () => null)
);

let currentBlockType = "normal";

const blockTypeButtons = document.querySelectorAll(".block-type-btn");
function selectBlockType(type) {
  currentBlockType = type;
  blockTypeButtons.forEach(btn => {
    btn.classList.toggle("selected", btn.dataset.type === type);
  });
}
document.getElementById("btnNormal").onclick = () => selectBlockType("normal");
document.getElementById("btnBooster").onclick = () => selectBlockType("booster");
document.getElementById("btnGun").onclick = () => selectBlockType("gun");
selectBlockType("normal");

function drawBuilder() {
  bctx.clearRect(0,0,builderCanvas.width,builderCanvas.height);
  bctx.strokeStyle = '#555';
  for (let r=0; r<GRID_ROWS; r++) {
    for (let c=0; c<GRID_COLS; c++) {
      bctx.strokeRect(c*CELL_W, r*CELL_H, CELL_W, CELL_H);
      const cell = carGrid[r][c];
      if (cell) {
        bctx.fillStyle = cell.color;
        bctx.fillRect(c*CELL_W+1, r*CELL_H+1, CELL_W-2, CELL_H-2);

        // inner marker for special blocks
        if (cell.type === "booster") {
          bctx.fillStyle = "cyan";
          bctx.fillRect(c*CELL_W+6, r*CELL_H+6, CELL_W-12, CELL_H-12);
        } else if (cell.type === "gun") {
          bctx.fillStyle = "yellow";
          bctx.fillRect(c*CELL_W+6, r*CELL_H+6, CELL_W-12, CELL_H-12);
        }
      }
    }
  }
}
drawBuilder();

builderCanvas.addEventListener('click', (e) => {
  const rect = builderCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const c = Math.floor(x / CELL_W);
  const r = Math.floor(y / CELL_H);
  if (r>=0 && r<GRID_ROWS && c>=0 && c<GRID_COLS) {
    if (carGrid[r][c]) {
      carGrid[r][c] = null;
    } else {
      carGrid[r][c] = {
        type: currentBlockType,
        color: document.getElementById('blockColor').value
      };
    }
    drawBuilder();
    document.getElementById('builderStatus').textContent = 'Car updated.';
  }
});

document.getElementById('clearCar').onclick = () => {
  carGrid = Array.from({ length: GRID_ROWS }, () =>
    Array.from({ length: GRID_COLS }, () => null)
  );
  drawBuilder();
  document.getElementById('builderStatus').textContent = 'Car cleared.';
};

function getCarDesign() {
  // deep copy grid
  const gridCopy = carGrid.map(row => row.map(cell => cell ? { ...cell } : null));
  return {
    grid: gridCopy,
    color: document.getElementById('blockColor').value
  };
}

// ===== PEERJS SETUP =====
let peer = null;
let conn = null;
let isHost = false;

const roomInfo = document.getElementById('roomInfo');

document.getElementById('hostBtn').onclick = () => {
  if (peer) return;
  isHost = true;
  peer = new Peer();
  peer.on('open', (id) => {
    roomInfo.textContent = 'Room code (give to friend): ' + id;
  });
  peer.on('connection', (c) => {
    if (conn) { c.close(); return; }
    conn = c;
    conn.on('open', () => {
      setupConnection();
      sendCarDesign();
    });
  });
};

document.getElementById('joinBtn').onclick = () => {
  if (peer) return;
  const room = prompt('Enter room code:');
  if (!room) return;
  peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(room);
    conn.on('open', () => {
      setupConnection();
      sendCarDesign();
    });
  });
};

function setupConnection() {
  roomInfo.textContent += ' | Connected!';
  conn.on('data', handleData);
}

// ===== GAME / BATTLE =====
const raceCanvas = document.getElementById('raceCanvas');
const rctx = raceCanvas.getContext('2d');

let myPlayer = {
  x: 200,
  y: 200,
  vx: 0,
  vy: 0,
  design: getCarDesign(),
  facing: 1,
  health: 100,
  _shootCooldown: 0
};
let otherPlayer = {
  x: 600,
  y: 200,
  vx: 0,
  vy: 0,
  design: null,
  facing: -1,
  health: 100
};

let keys = {};
window.addEventListener('keydown', (e) => { keys[e.key] = true; });
window.addEventListener('keyup',   (e) => { keys[e.key] = false; });

// bullets
let bullets = [];      // my bullets
let otherBullets = []; // opponent bullets

function sendCarDesign() {
  if (conn && conn.open) {
    myPlayer.design = getCarDesign();
    conn.send({ type: 'CAR_DESIGN', payload: myPlayer.design });
  }
}

function sendPosition() {
  if (conn && conn.open) {
    conn.send({
      type: 'POS',
      payload: {
        x: myPlayer.x,
        y: myPlayer.y,
        facing: myPlayer.facing,
        health: myPlayer.health
      }
    });
  }
}

function sendBullet(b) {
  if (conn && conn.open) {
    conn.send({ type: 'BULLET', payload: b });
  }
}

function handleData(data) {
  if (data.type === 'CAR_DESIGN') {
    otherPlayer.design = data.payload;
  } else if (data.type === 'POS') {
    otherPlayer.x = data.payload.x;
    otherPlayer.y = data.payload.y;
    otherPlayer.facing = data.payload.facing;
    otherPlayer.health = data.payload.health;
  } else if (data.type === 'BULLET') {
    otherBullets.push({ ...data.payload });
  }
}

function drawCar(ctx, x, y, design) {
  if (!design) return;
  const grid = design.grid;
  const blockSize = 8;

  for (let r=0; r<GRID_ROWS; r++) {
    for (let c=0; c<GRID_COLS; c++) {
      const cell = grid[r][c];
      if (cell) {
        ctx.fillStyle = cell.color;
        const bx = x + (c - GRID_COLS/2) * blockSize;
        const by = y + (r - GRID_ROWS/2) * blockSize;
        ctx.fillRect(bx, by, blockSize, blockSize);

        if (cell.type === "booster") {
          ctx.fillStyle = "cyan";
          ctx.fillRect(bx+2, by+2, blockSize-4, blockSize-4);
        } else if (cell.type === "gun") {
          ctx.fillStyle = "yellow";
          ctx.fillRect(bx+2, by+2, blockSize-4, blockSize-4);
        }
      }
    }
  }
}

function drawHealthBar(ctx, x, y, health) {
  const width = 60;
  const height = 6;
  ctx.fillStyle = "red";
  ctx.fillRect(x - width/2, y - 40, width, height);
  ctx.fillStyle = "lime";
  ctx.fillRect(x - width/2, y - 40, width * (health / 100), height);
}

function hasBoosterBlocks(design) {
  if (!design) return false;
  const grid = design.grid;
  for (let r=0; r<GRID_ROWS; r++) {
    for (let c=0; c<GRID_COLS; c++) {
      if (grid[r][c] && grid[r][c].type === "booster") return true;
    }
  }
  return false;
}

function hasGunBlocks(design) {
  if (!design) return false;
  const grid = design.grid;
  for (let r=0; r<GRID_ROWS; r++) {
    for (let c=0; c<GRID_COLS; c++) {
      if (grid[r][c] && grid[r][c].type === "gun") return true;
    }
  }
  return false;
}

function bulletHitCar(bullet, player) {
  if (!player.design) return false;
  const grid = player.design.grid;
  const blockSize = 8;

  for (let r=0; r<GRID_ROWS; r++) {
    for (let c=0; c<GRID_COLS; c++) {
      const cell = grid[r][c];
      if (!cell) continue;
      const bx = player.x + (c - GRID_COLS/2) * blockSize;
      const by = player.y + (r - GRID_ROWS/2) * blockSize;

      if (bullet.x > bx && bullet.x < bx + blockSize &&
          bullet.y > by && bullet.y < by + blockSize) {

        grid[r][c] = null; // remove block
        player.health -= 10;
        if (player.health < 0) player.health = 0;
        return true;
      }
    }
  }
  return false;
}

function updateBullets(list, targetPlayer) {
  for (let i = list.length - 1; i >= 0; i--) {
    const b = list[i];
    b.x += b.vx;
    b.y += b.vy;

    if (bulletHitCar(b, targetPlayer)) {
      list.splice(i, 1);
      continue;
    }

    if (b.x < 0 || b.x > raceCanvas.width || b.y < 0 || b.y > raceCanvas.height) {
      list.splice(i, 1);
    }
  }
}

// ===== ROUNDS =====
let currentRound = 1;
const maxRounds = 5;
let phase = "build"; // "build", "race", "done"
let phaseTime = 30;  // seconds
const roundInfo = document.getElementById('roundInfo');

function setPhase(p) {
  phase = p;
  if (phase === "build") {
    phaseTime = 30;
    roundInfo.textContent = `Round ${currentRound}/${maxRounds} - BUILD (30s to change your car)`;
  } else if (phase === "race") {
    phaseTime = 30;
    roundInfo.textContent = `Round ${currentRound}/${maxRounds} - RACE!`;
  } else {
    roundInfo.textContent = `All rounds finished!`;
  }
}
setPhase("build");

function updateRound(dt) {
  if (phase === "done") return;
  phaseTime -= dt;
  if (phaseTime <= 0) {
    if (phase === "build") {
      myPlayer.design = getCarDesign();
      sendCarDesign();
      myPlayer.health = 100;
      otherPlayer.health = 100;
      setPhase("race");
    } else if (phase === "race") {
      currentRound++;
      if (currentRound > maxRounds) {
        phase = "done";
        roundInfo.textContent = "All rounds finished!";
      } else {
        setPhase("build");
      }
    }
  }
}

// ===== UPDATE & RENDER =====
function update(dt) {
  if (phase === "race") {
    const accel = 0.4;
    if (keys["ArrowLeft"]) { myPlayer.vx -= accel; myPlayer.facing = -1; }
    if (keys["ArrowRight"]) { myPlayer.vx += accel; myPlayer.facing = 1; }
    if (keys["ArrowUp"]) { myPlayer.vy -= accel; }
    if (keys["ArrowDown"]) { myPlayer.vy += accel; }

    if (keys["Shift"] && hasBoosterBlocks(myPlayer.design)) {
      myPlayer.vx += myPlayer.facing * 0.5;
    }

    if (hasGunBlocks(myPlayer.design)) {
      myPlayer._shootCooldown -= dt;
      if ((keys["e"] || keys["E"]) && myPlayer._shootCooldown <= 0) {
        myPlayer._shootCooldown = 0.25;
        const bullet = {
          x: myPlayer.x,
          y: myPlayer.y,
          vx: myPlayer.facing * 6,
          vy: 0
        };
        bullets.push(bullet);
        sendBullet(bullet);
      }
    }

    myPlayer.x += myPlayer.vx;
    myPlayer.y += myPlayer.vy;
    myPlayer.vx *= 0.9;
    myPlayer.vy *= 0.9;

    myPlayer.x = Math.max(40, Math.min(raceCanvas.width-40, myPlayer.x));
    myPlayer.y = Math.max(40, Math.min(raceCanvas.height-40, myPlayer.y));
  }

  sendPosition();
}

function render() {
  rctx.clearRect(0,0,raceCanvas.width,raceCanvas.height);
  rctx.fillStyle = '#050505';
  rctx.fillRect(0,0,raceCanvas.width,raceCanvas.height);

  rctx.strokeStyle = '#555';
  rctx.strokeRect(10,10,raceCanvas.width-20,raceCanvas.height-20);

  drawCar(rctx, myPlayer.x, myPlayer.y, myPlayer.design);
  drawCar(rctx, otherPlayer.x, otherPlayer.y, otherPlayer.design);

  drawHealthBar(rctx, myPlayer.x, myPlayer.y, myPlayer.health);
  drawHealthBar(rctx, otherPlayer.x, otherPlayer.y, otherPlayer.health);

  rctx.fillStyle = 'yellow';
  bullets.forEach(b => {
    rctx.fillRect(b.x-2, b.y-2, 4, 4);
  });
  rctx.fillStyle = 'orange';
  otherBullets.forEach(b => {
    rctx.fillRect(b.x-2, b.y-2, 4, 4);
  });

  rctx.fillStyle = "#fff";
  rctx.font = "14px Arial";
  rctx.fillText(`Phase: ${phase.toUpperCase()} | Time: ${Math.ceil(phaseTime)}s`, 20, 24);
}

let lastTime = performance.now();
function loop() {
  const now = performance.now();
  const dtMs = now - lastTime;
  lastTime = now;
  const dt = dtMs / 1000;

  updateRound(dt);
  update(dt);
  updateBullets(bullets, otherPlayer);
  updateBullets(otherBullets, myPlayer);
  render();

  requestAnimationFrame(loop);
}
loop();

// keep my design in sync while building
setInterval(() => {
  if (phase === "build") {
    myPlayer.design = getCarDesign();
    sendCarDesign();
  }
}, 500);
</script>
</body>
</html>
