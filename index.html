<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiplayer Car Builder + PeerJS</title>
<style>
  body { font-family: Arial; background:#222; color:white; }
  #builder, #network, #game { margin:20px; padding:20px; background:#333; border-radius:10px; }
  canvas { background:#111; width:600px; height:400px; border:2px solid white; }
</style>
</head>
<body>

<h1>Multiplayer Car Builder + PeerJS</h1>

<!-- CAR BUILDER -->
<div id="builder">
  <h2>Build Your Car</h2>
  <label>Color: <input type="color" id="carColor" value="#ff0000"></label><br><br>
  <label>Max Speed: <input type="number" id="maxSpeed" value="5"></label><br><br>
  <label>Acceleration: <input type="number" id="accel" value="0.2"></label><br><br>
  <button id="saveCar">Save Car</button>
  <p id="carSaved"></p>
</div>

<!-- NETWORK -->
<div id="network">
  <h2>Multiplayer</h2>
  <button id="hostBtn">Host Game</button>
  <button id="joinBtn">Join Game</button>
  <p id="roomInfo"></p>
</div>

<!-- GAME -->
<div id="game">
  <h2>Race</h2>
  <canvas id="canvas" width="600" height="400"></canvas><br>
  <button id="startRace">Start Race</button>
</div>

<!-- PeerJS -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
let myCar = null;
let peer, conn;
let connections = [];
let allCars = {};
let isHost = false;

// CANVAS SETUP
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// PLAYER POSITION
let myX = 50, myY = 200, vel = 0;

// SAVE CAR
document.getElementById("saveCar").onclick = () => {
  myCar = {
    id: crypto.randomUUID(),
    color: document.getElementById("carColor").value,
    maxSpeed: Number(document.getElementById("maxSpeed").value),
    accel: Number(document.getElementById("accel").value)
  };
  document.getElementById("carSaved").innerText = "Car saved!";
};

// HOST GAME
document.getElementById("hostBtn").onclick = () => {
  isHost = true;
  peer = new Peer();

  peer.on("open", id => {
    document.getElementById("roomInfo").innerText = "Room Code: " + id;
  });

  peer.on("connection", c => {
    connections.push(c);
    c.on("data", handleData);
  });
};

// JOIN GAME
document.getElementById("joinBtn").onclick = () => {
  const room = prompt("Enter room code");
  peer = new Peer();

  peer.on("open", () => {
    conn = peer.connect(room);
    conn.on("open", () => {
      conn.send({ type:"CAR_CONFIG", payload: myCar });
    });
    conn.on("data", handleData);
  });
};

// HANDLE NETWORK DATA
function handleData(data) {
  if (data.type === "CAR_CONFIG") {
    allCars[data.payload.id] = { ...data.payload, x:50, y:Math.random()*350 };
  }
  if (data.type === "START_RACE") {
    allCars = data.payload;
  }
  if (data.type === "CAR_STATE") {
    if (allCars[data.payload.id]) {
      allCars[data.payload.id].x = data.payload.x;
      allCars[data.payload.id].y = data.payload.y;
    }
  }
}

// BROADCAST
function broadcast(msg) {
  connections.forEach(c => c.send(msg));
}

// START RACE
document.getElementById("startRace").onclick = () => {
  if (!isHost) return alert("Only host can start race");

  allCars[myCar.id] = { ...myCar, x:50, y:200 };

  broadcast({ type:"START_RACE", payload: allCars });
};

// GAME LOOP
function gameLoop() {
  ctx.clearRect(0,0,600,400);

  // Move my car
  if (myCar) {
    vel = Math.min(vel + myCar.accel, myCar.maxSpeed);
    myX += vel * 0.1;

    // Send state
    if (conn && conn.open) {
      conn.send({ type:"CAR_STATE", payload:{ id:myCar.id, x:myX, y:myY } });
    }
    if (isHost) {
      broadcast({ type:"CAR_STATE", payload:{ id:myCar.id, x:myX, y:myY } });
    }
  }

  // Draw all cars
  for (let id in allCars) {
    const c = allCars[id];
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x, c.y, 40, 20);
  }

  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>

</body>
</html>
