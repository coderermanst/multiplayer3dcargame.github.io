<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiplayer Block Car Builder + PeerJS</title>
<style>
  body { font-family: Arial, background:#222; color:#fff; margin:0; padding:0; }
  h1 { margin:20px; }
  .panel { margin:20px; padding:15px; background:#333; border-radius:8px; }
  #builderCanvas, #raceCanvas { background:#111; border:2px solid #fff; }
  button { margin:5px 0; padding:6px 10px; cursor:pointer; }
  label { display:block; margin:5px 0; }
  #roundInfo { margin-top:8px; font-weight:bold; }
</style>
</head>
<body>

<h1>Multiplayer Block Car Builder + PeerJS</h1>

<div class="panel">
  <h2>1. Build your car (blocks)</h2>
  <label>Block color: <input type="color" id="blockColor" value="#ff0000"></label>
  <p>Click on the grid to toggle blocks on/off.</p>
  <canvas id="builderCanvas" width="200" height="120"></canvas><br>
  <button id="clearCar">Clear</button>
  <p id="builderStatus"></p>
  <p id="roundInfo"></p>
</div>

<div class="panel">
  <h2>2. Multiplayer</h2>
  <button id="hostBtn">Host Game</button>
  <button id="joinBtn">Join Game</button>
  <p id="roomInfo"></p>
</div>

<div class="panel">
  <h2>3. Race</h2>
  <p>Arrows = move, Shift = boosters, E = shoot.</p>
  <canvas id="raceCanvas" width="600" height="300"></canvas><br>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ====== CAR BUILDER (BLOCKS) ======
const builderCanvas = document.getElementById('builderCanvas');
const bctx = builderCanvas.getContext('2d');
const GRID_COLS = 10;
const GRID_ROWS = 6;
const CELL_W = builderCanvas.width / GRID_COLS;
const CELL_H = builderCanvas.height / GRID_ROWS;

let carGrid = Array.from({ length: GRID_ROWS }, () =>
  Array.from({ length: GRID_COLS }, () => false)
);

function drawBuilder() {
  bctx.clearRect(0,0,builderCanvas.width,builderCanvas.height);
  bctx.strokeStyle = '#555';
  for (let r=0; r<GRID_ROWS; r++) {
    for (let c=0; c<GRID_COLS; c++) {
      bctx.strokeRect(c*CELL_W, r*CELL_H, CELL_W, CELL_H);
      if (carGrid[r][c]) {
        bctx.fillStyle = document.getElementById('blockColor').value;
        bctx.fillRect(c*CELL_W+1, r*CELL_H+1, CELL_W-2, CELL_H-2);
      }
    }
  }
}
drawBuilder();

builderCanvas.addEventListener('click', (e) => {
  const rect = builderCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const c = Math.floor(x / CELL_W);
  const r = Math.floor(y / CELL_H);
  if (r>=0 && r<GRID_ROWS && c>=0 && c<GRID_COLS) {
    carGrid[r][c] = !carGrid[r][c];
    drawBuilder();
    document.getElementById('builderStatus').textContent = 'Car updated.';
  }
});

document.getElementById('clearCar').onclick = () => {
  carGrid = Array.from({ length: GRID_ROWS }, () =>
    Array.from({ length: GRID_COLS }, () => false)
  );
  drawBuilder();
  document.getElementById('builderStatus').textContent = 'Car cleared.';
};

function getCarDesign() {
  return {
    grid: carGrid,
    color: document.getElementById('blockColor').value
  };
}

// ====== PEERJS SETUP ======
let peer = null;
let conn = null;
let isHost = false;

const roomInfo = document.getElementById('roomInfo');

document.getElementById('hostBtn').onclick = () => {
  if (peer) return;
  isHost = true;
  peer = new Peer();
  peer.on('open', (id) => {
    roomInfo.textContent = 'Room code (give to friend): ' + id;
  });
  peer.on('connection', (c) => {
    if (conn) { c.close(); return; }
    conn = c;
    setupConnection();
  });
};

document.getElementById('joinBtn').onclick = () => {
  const room = prompt('Enter room code:');
  if (!room) return;
  if (!peer) {
    peer = new Peer();
  }
  peer.on('open', () => {
    conn = peer.connect(room);
    conn.on('open', () => {
      setupConnection();
      conn.send({ type: 'CAR_DESIGN', payload: getCarDesign() });
    });
  });
};

function setupConnection() {
  roomInfo.textContent += ' | Connected!';
  conn.on('data', handleData);
  if (isHost) {
    conn.send({ type: 'CAR_DESIGN', payload: getCarDesign() });
  }
}

// ====== GAME / RACE ======
const raceCanvas = document.getElementById('raceCanvas');
const rctx = raceCanvas.getContext('2d');

let myPlayer = {
  x: 100,
  y: 150,
  vx: 0,
  vy: 0,
  design: getCarDesign(),
  facing: 1
};
let otherPlayer = {
  x: 400,
  y: 150,
  vx: 0,
  vy: 0,
  design: null,
  facing: -1
};

let keys = {};
window.addEventListener('keydown', (e) => { keys[e.key] = true; });
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// bullets
let bullets = [];      // local bullets
let otherBullets = []; // bullets from other player

function handleData(data) {
  if (data.type === 'CAR_DESIGN') {
    otherPlayer.design = data.payload;
  }
  if (data.type === 'POS') {
    otherPlayer.x = data.payload.x;
    otherPlayer.y = data.payload.y;
    otherPlayer.facing = data.payload.facing;
  }
  if (data.type === 'BULLET') {
    otherBullets.push({
      x: data.payload.x,
      y: data.payload.y,
      vx: data.payload.vx,
      vy: data.payload.vy
    });
  }
}

function sendPosition() {
  if (conn && conn.open) {
    conn.send({
      type: 'POS',
      payload: { x: myPlayer.x, y: myPlayer.y, facing: myPlayer.facing }
    });
  }
}

function sendBullet(b) {
  if (conn && conn.open) {
    conn.send({ type: 'BULLET', payload: b });
  }
}

function drawCar(ctx, x, y, design) {
  if (!design) return;
  const grid = design.grid;
  const color = design.color;
  const blockSize = 8;

  ctx.fillStyle = color;
  for (let r=0; r<grid.length; r++) {
    for (let c=0; c<grid[0].length; c++) {
      if (grid[r][c]) {
        const bx = x + (c - GRID_COLS/2) * blockSize;
        const by = y + (r - GRID_ROWS/2) * blockSize;
        ctx.fillRect(bx, by, blockSize, blockSize);
      }
    }
  }
}

function updateBullets(list) {
  for (let i = list.length - 1; i >= 0; i--) {
    const b = list[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < 0 || b.x > raceCanvas.width || b.y < 0 || b.y > raceCanvas.height) {
      list.splice(i, 1);
    }
  }
}

// boosters: any block in bottom row acts as booster
function hasBoosterBlocks(design) {
  if (!design) return false;
  const grid = design.grid;
  const r = GRID_ROWS - 1;
  for (let c=0; c<GRID_COLS; c++) {
    if (grid[r][c]) return true;
  }
  return false;
}

let boosterCooldown = 0;
let boosterActiveTime = 0;

// rounds & phases
let currentRound = 1;
const maxRounds = 5;
let phase = 'build'; // 'build' or 'race'
let phaseTime = 30;  // seconds
const roundInfo = document.getElementById('roundInfo');

function setPhase(p) {
  phase = p;
  if (phase === 'build') {
    phaseTime = 30;
    roundInfo.textContent = `Round ${currentRound}/${maxRounds} - BUILD (30s to change your car)`;
  } else {
    phaseTime = 30;
    roundInfo.textContent = `Round ${currentRound}/${maxRounds} - RACE!`;
  }
}

setPhase('build');

function updateRound(dt) {
  phaseTime -= dt;
  if (phaseTime <= 0) {
    if (phase === 'build') {
      myPlayer.design = getCarDesign();
      if (conn && conn.open) {
        conn.send({ type: 'CAR_DESIGN', payload: myPlayer.design });
      }
      setPhase('race');
    } else {
      currentRound++;
      if (currentRound > maxRounds) {
        roundInfo.textContent = 'All rounds finished!';
        phase = 'done';
      } else {
        setPhase('build');
      }
    }
  }
}

function update() {
  const dt = 1/60;

  if (phase !== 'race') {
    sendPosition();
    return;
  }

  const baseSpeed = 2;
  let speed = baseSpeed;

  if (boosterCooldown > 0) boosterCooldown -= dt;
  if (boosterActiveTime > 0) boosterActiveTime -= dt;

  if (boosterActiveTime > 0) {
    speed = 4;
  }

  if (keys['ArrowUp']) myPlayer.y -= speed;
  if (keys['ArrowDown']) myPlayer.y += speed;
  if (keys['ArrowLeft']) { myPlayer.x -= speed; myPlayer.facing = -1; }
  if (keys['ArrowRight']) { myPlayer.x += speed; myPlayer.facing = 1; }

  if (keys['Shift'] && boosterCooldown <= 0 && hasBoosterBlocks(myPlayer.design)) {
    boosterActiveTime = 1.0;
    boosterCooldown = 3.0;
  }

  if (keys['e'] || keys['E']) {
    if (!myPlayer._shootCooldown) myPlayer._shootCooldown = 0;
    myPlayer._shootCooldown -= dt;
    if (myPlayer._shootCooldown <= 0) {
      myPlayer._shootCooldown = 0.3;
      const bulletSpeed = 5;
      const b = {
        x: myPlayer.x,
        y: myPlayer.y,
        vx: myPlayer.facing * bulletSpeed,
        vy: 0
      };
      bullets.push(b);
      sendBullet(b);
    }
  } else {
    if (myPlayer._shootCooldown) {
      myPlayer._shootCooldown -= dt;
    }
  }

  myPlayer.x = Math.max(20, Math.min(raceCanvas.width-20, myPlayer.x));
  myPlayer.y = Math.max(20, Math.min(raceCanvas.height-20, myPlayer.y));

  sendPosition();
}

function render() {
  rctx.clearRect(0,0,raceCanvas.width,raceCanvas.height);
  rctx.fillStyle = '#050505';
  rctx.fillRect(0,0,raceCanvas.width,raceCanvas.height);

  rctx.strokeStyle = '#555';
  rctx.strokeRect(10,10,raceCanvas.width-20,raceCanvas.height-20);

  drawCar(rctx, myPlayer.x, myPlayer.y, myPlayer.design);
  drawCar(rctx, otherPlayer.x, otherPlayer.y, otherPlayer.design);

  rctx.fillStyle = 'yellow';
  bullets.forEach(b => {
    rctx.fillRect(b.x-2, b.y-2, 4, 4);
  });
  rctx.fillStyle = 'orange';
  otherBullets.forEach(b => {
    rctx.fillRect(b.x-2, b.y-2, 4, 4);
  });
}

let lastTime = performance.now();
function loop() {
  const now = performance.now();
  const dtMs = now - lastTime;
  lastTime = now;
  const dt = dtMs / 1000;

  if (phase !== 'done') {
    updateRound(dt);
  }

  update();
  updateBullets(bullets);
  updateBullets(otherBullets);
  render();

  requestAnimationFrame(loop);
}
loop();

setInterval(() => {
  myPlayer.design = getCarDesign();
}, 500);
</script>
</body>
</html>
